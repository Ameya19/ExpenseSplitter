<nav class="navbar">

    <!-- Logo -->
    <div class="navbar-brand" routerLink="/dashboard">
        <mat-icon>account_balance_wallet</mat-icon>
        <span>ExpenseSplitter</span>
    </div>

    <!-- Desktop navigation links -->
    <div class="nav-links desktop-only">
        <a *ngFor="let link of navLinks" [routerLink]="link.path" routerLinkActive="active" class="nav-link">
            <mat-icon>{{ link.icon }}</mat-icon>
            <span>{{ link.label }}</span>
        </a>
    </div>

    <!-- Right Side Actions -->
    <div class="navbar-actions">

        <!-- Dark mode toggle -->
        <button
            mat-icon-button
            type="button"
            class="theme-btn"
            (click)="themeService.toggle()"
            [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
            <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- Notifications -->
        <button mat-icon-button routerLink="/notifications" [matBadge]="unreadCount" matBadgeColor="warn" [matBadgeHidden]="unreadCount === 0" class="notification-btn">
            <mat-icon>notifications</mat-icon>
        </button>
    </div>

    <!-- User Menu -->
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="avatar-btn">
        <div class="avatar">{{ getInitial() }}</div>
    </button>

    <mat-menu #userMenu="matMenu" class="user-menu">
        <!-- User Menu -->
        <div class="menu-user-info">
            <div class="menu-avatar">{{ getInitial() }}</div>
            <div>
                <p class="menu-name">{{ currentUser?.displayName }}</p>
                <p class="menu-email">{{ currentUser?.email }}</p>
            </div>
        </div>

        <mat-divider></mat-divider>

        <button mat-menu-item routerLink="profile">
            <mat-icon>person</mat-icon>
            Profile
        </button>

        <button mat-menu-item routerLink="/notifications">
            <mat-icon>notifications</mat-icon>
            Notifications
            <span class="badge" *ngIf="unreadCount > 0">
                {{ unreadCount }}
            </span>
        </button>

        <mat-divider></mat-divider>

        <button mat-menu-item (click)="logout()" class="logout-btn">
            <mat-icon>logout</mat-icon>
            Logout
        </button>
    </mat-menu>

    <!-- Mobile Menu Toggle -->
    <button mat-icon-button class="mobile-only" (click)="toggleMobileMenu()">
        <mat-icon>{{ isMobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" [class.open]="isMobileMenuOpen" (click)="isMobileMenuOpen = false">
    <button
        type="button"
        class="mobile-nav-link mobile-theme-toggle"
        (click)="themeService.toggle(); $event.stopPropagation()">
        <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ themeService.isDarkMode() ? 'Light mode' : 'Dark mode' }}</span>
    </button>
    <a *ngFor="let link of navLinks" [routerLink]="link.path" routerLinkActive="active" class="mobile-nav-link">
        <mat-icon>{{ link.icon }}</mat-icon>
        <span>{{ link.label }}</span>
    </a>
</div>
