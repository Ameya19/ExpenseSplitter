<div class="page-container">

    <div class="page-header">
        <button mat-icon-button (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h1>{{ isEditMode ? 'Edit Group' : 'Create Group' }}</h1>
    </div>

    <mat-card class="form-card">
        <mat-card-content>
            <form [formGroup]="groupFrom" (ngSubmit)="onSubmit()">

                <!-- Name -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Group Name</mat-label>
                    <input matInput formControlName="name" placeholder="Enter group name">
                    <mat-icon matSuffix>group</mat-icon>
                    <mat-error *ngIf="name?.hasError('required')">
                        Name is required
                    </mat-error>
                    <mat-error *ngIf="name?.hasError('minlength')">
                        Name must be at least 2 characters
                    </mat-error>
                </mat-form-field>

                <!-- Description -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Description (optional)</mat-label>
                    <textarea matInput formControlName="description" row="3" placeholder="What is this group for?"></textarea>
                </mat-form-field>

                <!-- Error -->
                <div class="error-message" *ngIf="errorMessage">
                    <mat-icon>error</mat-icon>
                    {{ errorMessage }}
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button mat-stroked-button type="button" (click)="goBack()">
                        Cancel
                    </button>
                    <button mat-raised-button color="primary" type="submit" [disabled]="groupFrom.invalid || isLoading">
                        <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
                        <span *ngIf="!isLoading">
                            {{ isEditMode ? 'Update Group' : 'Create Group' }}
                        </span>
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
